<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunghee Jung — Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-[#f5f5f5] font-['Inter',sans-serif] text-gray-900 overflow-x-hidden antialiased">

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-5 py-5 sm:px-8 sm:py-6">
    <a href="#projects" class="flex items-baseline gap-1.5 text-sm sm:text-base font-medium tracking-tight hover:opacity-70 transition-opacity">
      <span>projetcs</span>
      <span class="text-xs text-gray-500 font-normal">5</span>
    </a>
    <span class="text-sm sm:text-base font-medium tracking-tight">Sunghee Jung</span>
  </header>

  <!-- Hero -->
  <main class="relative min-h-screen flex items-center justify-center px-4 sm:px-6 pt-20 pb-16 sm:pb-20 overflow-visible">
    <div id="hero-scene" class="relative w-full max-w-6xl min-h-[calc(100vh-6rem)] sm:min-h-[calc(100vh-5rem)] flex items-center justify-center overflow-visible">

      <!-- Floating project items -->
      <div class="float-item absolute z-10 w-[100px] sm:w-[130px] md:w-[160px] lg:w-[180px]"
           data-depth="0.04" data-float="1"
           style="top: 2%; left: 0%; --rotate: -12deg; --float-duration: 5s; --float-delay: 0s;">
        <div class="float-card rounded-xl overflow-hidden shadow-lg rotate-[var(--rotate)]">
          <div class="dashboard-mockup aspect-[4/3]">
            <div class="dash-sidebar"></div>
            <div class="dash-main">
              <div class="dash-chart"></div>
              <div class="dash-bars">
                <span style="height:55%"></span>
                <span style="height:75%"></span>
                <span style="height:90%"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="float-item absolute z-10 w-[90px] sm:w-[110px] md:w-[130px]"
           data-depth="0.06" data-float="2"
           style="top: 0%; right: 2%; --rotate: 8deg; --float-duration: 6s; --float-delay: 0.8s;">
        <div class="float-card rounded-2xl overflow-hidden shadow-lg rotate-[var(--rotate)]">
          <div class="mobile-banner aspect-[9/16]">
            <div class="banner-top">2026</div>
            <div class="banner-title">설날 선물<br/>특가 세일</div>
            <div class="banner-products">
              <div class="banner-dot"></div>
              <div class="banner-dot"></div>
              <div class="banner-dot"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="float-item absolute z-10 w-[110px] sm:w-[140px] md:w-[155px]"
           data-depth="0.05" data-float="3"
           style="bottom: 18%; left: 2%; --rotate: -6deg; --float-duration: 5.5s; --float-delay: 1.2s;">
        <div class="float-card info-card rounded-2xl shadow-lg rotate-[var(--rotate)] p-3 sm:p-4">
          <p class="text-[10px] sm:text-xs text-gray-500 leading-tight">Digital Marketing</p>
          <p class="text-xs sm:text-sm font-medium mt-0.5">works 3</p>
          <div class="info-arrow">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5h6M5 2l3 3-3 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
      </div>

      <div class="float-item phone-float absolute z-10 w-[105px] sm:w-[135px] md:w-[165px] lg:w-[190px]"
           data-depth="0.07" data-float="4"
           style="bottom: 3%; left: 34%; --rotate: 5deg; --float-duration: 4.8s; --float-delay: 0.4s;">
        <div class="float-card phone-float-card rotate-[var(--rotate)]">
          <img
            src="assets/phone-mockup.png"
            alt="모바일 앱 프로젝트"
            class="phone-mockup-img"
            width="499"
            height="934"
            draggable="false"
          />
        </div>
      </div>

      <div class="float-item absolute z-10 w-[100px] sm:w-[130px] md:w-[160px] lg:w-[175px]"
           data-depth="0.045" data-float="5"
           style="bottom: 10%; right: 0%; --rotate: -8deg; --float-duration: 5.2s; --float-delay: 1.6s;">
        <div class="float-card rounded-xl overflow-hidden shadow-lg rotate-[var(--rotate)]">
          <div class="website-mockup aspect-[4/3]">
            <div class="web-hero"></div>
            <div class="web-grid">
              <div></div><div></div><div></div>
            </div>
          </div>
        </div>
      </div>

      <div class="float-item absolute z-10 w-[110px] sm:w-[140px] md:w-[155px]"
           data-depth="0.055" data-float="6"
           style="top: 38%; right: 4%; --rotate: 10deg; --float-duration: 6.2s; --float-delay: 2s;">
        <div class="float-card info-card rounded-2xl shadow-lg rotate-[var(--rotate)] p-3 sm:p-4">
          <p class="text-[10px] sm:text-xs text-gray-500 leading-tight">Product Designer</p>
          <p class="text-xs sm:text-sm font-medium mt-0.5">works 3</p>
          <div class="info-arrow">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5h6M5 2l3 3-3 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
      </div>

      <!-- Center title -->
      <div class="relative z-20 text-center select-none pointer-events-none px-3 sm:px-4 -translate-y-6 sm:-translate-y-8">
        <p class="text-xs sm:text-sm text-gray-600 font-medium tracking-wide mb-2 sm:mb-3">Product Designer</p>
        <h1 class="portfolio-title flex items-center justify-center gap-0 leading-none">
          <img
            src="assets/portfolio-title.png"
            alt="PORTFOLIO"
            class="portfolio-title-img"
            width="1056"
            height="332"
            draggable="false"
          />
        </h1>
      </div>

    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
